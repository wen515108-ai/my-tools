<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>世界簡史對照表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f7f7f5;color:#111;font-size:14px;min-height:100vh}
.app{max-width:1280px;margin:0 auto;padding:1.2rem .8rem}
h1{font-size:18px;font-weight:700;margin-bottom:.4rem;display:flex;align-items:center;gap:8px}
button{font-family:inherit;cursor:pointer}
.topnav{display:flex;gap:6px;margin-bottom:.8rem;flex-wrap:wrap;align-items:center}
.tnbtn{padding:5px 13px;border-radius:20px;border:1px solid #ccc;background:#fff;font-size:13px;color:#555}
.tnbtn.on{background:#111;color:#fff;border-color:#111;font-weight:600}
.abtn{padding:5px 11px;border-radius:20px;border:1px solid #ccc;background:#fff;font-size:12px;color:#555}
.abtn.jout{border-color:#639922;background:#EAF3DE;color:#3B6D11}
.abtn.jin{border-color:#378ADD;background:#E6F1FB;color:#185FA5}
.abtn.danger{border-color:#c0392b;background:#FCEBEB;color:#c0392b}
.ml{margin-left:auto}

/* ── 同步狀態列 ── */
.sync-bar{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;margin-bottom:.8rem;font-size:12px;background:#f0f0ee;border:1px solid #e0e0de;flex-wrap:wrap}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4cd964;flex-shrink:0;transition:background .3s}
.sync-dot.syncing{background:#ff9500;animation:blink .6s infinite}
.sync-dot.error{background:#ff3b30}
.sync-dot.offline{background:#aaa}
.sync-label{color:#555;font-size:12px}
.queue-pill{background:#ff9500;color:#fff;border-radius:20px;padding:1px 7px;font-size:11px;font-weight:700;display:none}
.queue-pill.show{display:inline-block}
.sync-btn{padding:3px 9px;border-radius:12px;border:1px solid #ddd;background:#fff;font-size:11px;color:#555;margin-left:auto}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── 設定 API 畫面 ── */
#setup-overlay{position:fixed;inset:0;background:#f7f7f5;z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
#setup-overlay.hidden{display:none}
.setup-card{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.setup-emoji{font-size:40px;text-align:center;margin-bottom:12px}
.setup-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:6px}
.setup-desc{font-size:12px;color:#888;text-align:center;margin-bottom:16px;line-height:1.6}
.setup-steps{font-size:11px;color:#666;background:#f5f5f3;border-radius:8px;padding:10px 12px;margin-bottom:14px;line-height:2}
.setup-input{width:100%;padding:11px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;margin-bottom:10px;font-family:inherit}
.setup-btn{width:100%;padding:12px;background:#111;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.setup-reset{display:block;text-align:center;margin-top:8px;font-size:11px;color:#aaa;cursor:pointer}

/* ── 載入中 ── */
#loading-overlay{position:fixed;inset:0;background:#f7f7f5;z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
#loading-overlay.hidden{display:none;pointer-events:none}
.loading-spinner{width:36px;height:36px;border:3px solid #e0e0e0;border-top-color:#111;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:#888}

/* ── 主要介面（保留原有樣式） ── */
.io-bar{display:flex;gap:7px;align-items:center;padding:.6rem .9rem;background:#EEEDFE;border:1px solid #AFA9EC;border-radius:10px;margin-bottom:.8rem;flex-wrap:wrap}
.io-bar-label{font-size:12px;color:#3C3489;flex:1;min-width:120px}
.card{border:1px solid #ddd;border-radius:12px;padding:1.1rem;background:#fff;margin-bottom:.8rem}
.card-title{font-size:14px;font-weight:700;color:#111;margin-bottom:.9rem}
.fg{margin-bottom:9px}
.fg label{display:block;font-size:11px;color:#999;margin-bottom:3px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.fg input,.fg select,.fg textarea{width:100%;font-size:13px;padding:7px 9px;border:1px solid #ddd;border-radius:7px;color:#111;background:#fff;font-family:inherit;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#555}
.fg textarea{min-height:65px;resize:vertical}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:9px;align-items:end}
.fa{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.bsave{padding:6px 15px;border-radius:7px;border:1px solid #111;background:#111;font-size:13px;color:#fff;font-weight:600}
.bcancel{padding:6px 11px;border-radius:7px;border:1px solid #ddd;background:#fff;font-size:13px;color:#666}
.bedit{padding:4px 9px;border-radius:7px;border:1px solid #ddd;background:#fff;font-size:12px;color:#555}
.bdanger{padding:4px 9px;border-radius:7px;border:1px solid #f09595;background:#FCEBEB;font-size:12px;color:#A32D2D}
.fbar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.6rem;align-items:center}
.fbar-label{font-size:11px;color:#999;white-space:nowrap;font-weight:600}
.fb{padding:3px 8px;border-radius:12px;border:1px solid #ddd;background:#fff;font-size:11px;color:#666}
.cfbtn{padding:3px 8px;border-radius:12px;border:1px solid #ddd;background:#fff;font-size:11px;color:#666;white-space:nowrap}
.cfbtn.on{background:#eee;color:#111;border-color:#aaa;font-weight:600}
.tbl-wrap{overflow-x:auto;border:1px solid #ddd;border-radius:10px;background:#fff}
table{border-collapse:collapse;min-width:100%}
thead th{font-size:11px;font-weight:700;color:#666;padding:7px 9px;border-bottom:1px solid #eee;text-align:left;white-space:nowrap;background:#f8f8f6}
thead th:first-child{min-width:68px;width:68px;position:sticky;left:0;z-index:2;background:#f8f8f6}
tbody tr{border-bottom:1px solid #f0f0f0}
tbody tr:last-child{border-bottom:none}
tbody tr:hover td{background:#fafafa}
tbody tr:hover td:first-child{background:#fafafa}
td{vertical-align:middle;padding:5px 7px}
td:first-child{font-size:11px;font-weight:700;color:#999;white-space:nowrap;padding:5px 9px;width:68px;position:sticky;left:0;z-index:1;background:#fff}
.era-row td{background:#f3f3f0;font-size:11px;color:#999;font-style:italic;padding:3px 9px;font-weight:600}
.dash{color:#ddd;font-size:13px}
.pill{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;cursor:pointer;margin:1px;white-space:nowrap;font-weight:500}
.pill:hover{opacity:.75}
.pill.sel{outline:2px solid currentColor;outline-offset:2px}
.detail-panel{border:1px solid #ddd;border-radius:12px;padding:1rem 1.1rem;margin-top:.7rem;background:#fff}
.dp-hd{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px}
.dp-title{font-size:15px;font-weight:700;color:#111;flex:1}
.dp-close{padding:3px 8px;border-radius:7px;border:1px solid #ddd;background:#fff;font-size:12px;color:#666}
.dp-meta{font-size:12px;color:#888;margin-bottom:9px;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.ibox{background:#f7f7f5;border-radius:8px;padding:8px 11px;margin-bottom:7px}
.ibox-lbl{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.ibox p{font-size:13px;color:#555;line-height:1.6;white-space:pre-wrap}
.dp-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.dpbtn{font-size:12px;padding:5px 11px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#555}
.dpbtn.danger{color:#A32D2D;border-color:#f09595;background:#FCEBEB}
.grid-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;align-items:start}
.gc{border:1px solid #ddd;border-radius:10px;background:#fff;overflow:hidden}
.gc-hd{display:flex;gap:6px;align-items:center;padding:10px 12px;border-bottom:1px solid #f0f0f0}
.gc-flag{font-size:16px}
.gc-name{font-size:13px;font-weight:700;color:#111}
.gc-reg{font-size:10px;color:#aaa}
.gc-ev{padding:7px 12px;border-bottom:1px solid #f0f0f0;cursor:pointer}
.gc-ev:last-child{border-bottom:none}
.gc-ev:hover{background:#f8f8f8}
.gc-ev.active{background:#f0f0f8}
.gc-yr{font-size:10px;color:#aaa;margin-bottom:1px}
.gc-title{font-size:12px;color:#111;display:flex;align-items:center;justify-content:space-between;gap:4px}
.gc-arrow{font-size:10px;color:#aaa;flex-shrink:0}
.inline-detail{border-top:2px solid #534AB7;background:#EEEDFE;padding:10px 12px}
.inline-detail-title{font-size:13px;font-weight:700;color:#3C3489;margin-bottom:3px}
.inline-detail-meta{font-size:11px;color:#7F77DD;margin-bottom:6px;display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.inline-detail-desc{font-size:12px;color:#3C3489;line-height:1.6;margin-bottom:8px;white-space:pre-wrap}
.inline-detail-btns{display:flex;gap:6px}
.idbtn{font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid #AFA9EC;background:#fff;color:#534AB7}
.idbtn.danger{color:#A32D2D;border-color:#f09595;background:#FCEBEB}
.clist-hd{display:grid;grid-template-columns:30px 1fr 70px 56px 58px 58px;gap:7px;align-items:center;padding:6px 11px;background:#f8f8f6;font-size:11px;font-weight:700;color:#999;border-bottom:1px solid #eee}
.clist-row{display:grid;grid-template-columns:30px 1fr 70px 56px 58px 58px;gap:7px;align-items:center;padding:7px 11px;border-bottom:1px solid #f0f0f0}
.clist-row:last-child{border-bottom:none}
.clist-row:hover{background:#fafafa}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:500}
.status{font-size:12px;min-height:18px;padding:2px 0;margin-bottom:4px}
.s-ok{color:#3C3489;font-weight:500}
.s-err{color:#A32D2D;font-weight:500}
.empty{text-align:center;padding:2rem 1rem;color:#aaa;font-size:13px;line-height:1.9}
.country-checkboxes{display:flex;flex-wrap:wrap;gap:5px;padding:6px 0}
.country-cb-item{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:12px;color:#555;user-select:none;transition:background .15s,border-color .15s}
.country-cb-item.checked{background:#111;color:#fff;border-color:#111}
.type-list-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid #f0f0f0}
.type-list-row:last-child{border-bottom:none}
.type-color-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.type-list-name{flex:1;font-size:13px;font-weight:600}
.color-presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.color-preset{width:22px;height:22px;border-radius:50%;border:3px solid transparent;cursor:pointer}
.color-preset.sel{border-color:#111}
.back-btn{font-size:13px;color:#555;text-decoration:none;padding:4px 0;display:inline-flex;align-items:center;gap:4px;margin-bottom:8px;background:none;border:none;cursor:pointer}
</style>
</head>
<body>

<!-- 設定 API 畫面 -->
<div id="setup-overlay">
  <div class="setup-card">
    <div class="setup-emoji">📜</div>
    <div class="setup-title">連結 Google Sheets</div>
    <div class="setup-desc">請先設定好 Apps Script 後端，再貼上 API 網址</div>
    <div class="setup-steps">
      <b>① 前往 script.google.com 新增專案</b><br>
      <b>② 貼上 world-history-Code.gs 的內容</b><br>
      <b>③ 部署為網路應用程式</b>（執行身分：我；存取：任何人）<br>
      <b>④ 複製部署 URL 貼到下方</b>
    </div>
    <input id="api-url-input" class="setup-input" type="url"
      placeholder="https://script.google.com/macros/s/…/exec"
      autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="setup-btn" onclick="saveApiUrl()">✓ 確認連結</button>
    <span class="setup-reset" onclick="clearApiUrl()">清除設定 / 重新連結</span>
  </div>
</div>

<!-- 載入中 -->
<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">載入資料中…</div>
</div>

<div class="app">
  <button class="back-btn" onclick="history.back()">← 返回工具箱</button>
  <h1>🌍 世界簡史對照表
    <span id="sync-dot-h" class="sync-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#4cd964;vertical-align:middle;margin-left:2px"></span>
  </h1>

  <!-- 同步列 -->
  <div class="sync-bar">
    <span class="sync-dot" id="sync-dot"></span>
    <span class="sync-label" id="sync-label">連線中</span>
    <span class="queue-pill" id="queue-pill">0</span>
    <button class="sync-btn" onclick="forceSync()">🔄 同步</button>
    <button class="abtn jout" onclick="exportJSON()">⬇ 備份 JSON</button>
    <button class="abtn jin" onclick="document.getElementById('importFile').click()">⬆ 還原 JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>

  <div class="topnav">
    <button class="tnbtn on" onclick="switchView('matrix')">橫向對照表</button>
    <button class="tnbtn" onclick="switchView('grid')">國家視角</button>
    <button class="tnbtn" onclick="switchView('countries')">管理國家</button>
    <button class="tnbtn" onclick="switchView('types')">管理類別</button>
    <button class="abtn ev ml" onclick="toggleForm()">＋ 新增事件</button>
  </div>
  <div id="formArea"></div>
  <div id="statusMsg" class="status"></div>
  <div id="mainView"></div>
  <div id="detailArea"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  雲端 API 層
// ══════════════════════════════════════════════════════════════
const LS_API   = 'wh_api_url';
const LS_CACHE = 'wh_cache_v1';
const LS_QUEUE = 'wh_sync_queue';
let API_URL = localStorage.getItem(LS_API) || '';

let syncQueue = [];
try { syncQueue = JSON.parse(localStorage.getItem(LS_QUEUE) || '[]'); } catch(e) {}
function saveQueue(){ localStorage.setItem(LS_QUEUE, JSON.stringify(syncQueue)); }

function setSyncStatus(s, label) {
  const dot = document.getElementById('sync-dot');
  const dotH = document.getElementById('sync-dot-h');
  const lbl = document.getElementById('sync-label');
  const cls = s === 'ok' ? '' : s === 'error' ? 'error' : s === 'offline' ? 'offline' : 'syncing';
  dot.className = 'sync-dot' + (cls ? ' ' + cls : '');
  if (dotH) dotH.className = dot.className;
  lbl.textContent = label || { ok:'已同步', error:'連線失敗', offline:'離線模式', syncing:'同步中' }[s] || s;
}

function updateQueuePill() {
  const p = document.getElementById('queue-pill');
  if (syncQueue.length) { p.textContent = syncQueue.length; p.classList.add('show'); }
  else p.classList.remove('show');
}

async function apiGet(params) {
  const r = await fetch(API_URL + '?' + new URLSearchParams(params), { mode:'cors' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function apiPost(body) {
  const r = await fetch(API_URL, { method:'POST', mode:'cors', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

window.addEventListener('online',  () => { updateOffline(); flushQueue(); });
window.addEventListener('offline', updateOffline);
function updateOffline() {
  if (!navigator.onLine) setSyncStatus('offline');
}

// ── 設定 URL ──
function saveApiUrl() {
  const val = document.getElementById('api-url-input').value.trim();
  if (!val || !val.startsWith('https://')) { alert('請輸入正確的 URL'); return; }
  API_URL = val;
  localStorage.setItem(LS_API, val);
  document.getElementById('setup-overlay').classList.add('hidden');
  startApp();
}
function clearApiUrl() {
  localStorage.removeItem(LS_API);
  API_URL = '';
  document.getElementById('setup-overlay').classList.remove('hidden');
  document.getElementById('api-url-input').value = '';
}

// ── 快取 ──
function saveToCache() {
  localStorage.setItem(LS_CACHE, JSON.stringify({ events, countries, types: TM }));
}
function loadFromCache() {
  try {
    const c = JSON.parse(localStorage.getItem(LS_CACHE) || '{}');
    if (c.events)    events    = c.events;
    if (c.countries && c.countries.length) countries = c.countries;
    if (c.types)     TM        = c.types;
  } catch(e) {}
}

// ── 從雲端載入 ──
async function loadFromCloud() {
  setSyncStatus('syncing');
  const data = await apiGet({ action: 'load' });
  if (data.error) throw new Error(data.error);
  if (data.events)    events    = data.events;
  if (data.countries && data.countries.length) countries = data.countries;
  if (data.types && Object.keys(data.types).length) TM = data.types;
  events.forEach(e => { if (!e.countries) e.countries = []; });
  saveToCache();
  setSyncStatus('ok');
}

// ── 佇列同步 ──
async function enqueue(action, payload) {
  const op = { action, payload, ts: Date.now() };
  // 特殊：updateEvent / deleteEvent 去重
  if (action === 'updateEvent') syncQueue = syncQueue.filter(o => !(o.action === 'updateEvent' && o.payload.id === payload.id));
  if (action === 'deleteEvent') syncQueue = syncQueue.filter(o => !(o.action === 'addEvent' && o.payload.id === payload) && !(o.action === 'updateEvent' && o.payload.id === payload));
  syncQueue.push(op);
  saveQueue();
  updateQueuePill();
  if (navigator.onLine) flushQueue();
}

let flushing = false;
async function flushQueue() {
  if (flushing || !syncQueue.length || !API_URL) return;
  flushing = true;
  setSyncStatus('syncing');
  while (syncQueue.length) {
    const op = syncQueue[0];
    try {
      const body = op.action === 'deleteEvent'
        ? { action: op.action, id: op.payload }
        : { action: op.action, payload: op.payload };
      const res = await apiPost(body);
      if (res.error) throw new Error(res.error);
      syncQueue.shift();
      saveQueue();
      updateQueuePill();
    } catch(e) {
      setSyncStatus('error');
      flushing = false;
      return;
    }
  }
  flushing = false;
  setSyncStatus('ok');
}

async function forceSync() {
  if (!API_URL) { showStatus('尚未設定 API URL', true); return; }
  try {
    setSyncStatus('syncing', '同步中…');
    await loadFromCloud();
    visC = new Set(countries.map(c => c.id));
    filterT = new Set(Object.keys(TM));
    render();
    showStatus('✓ 已同步最新資料');
  } catch(e) {
    setSyncStatus('error', '連線失敗');
    showStatus('❌ 同步失敗：' + e.message, true);
  }
}

// ══════════════════════════════════════════════════════════════
//  資料
// ══════════════════════════════════════════════════════════════
var events = [], countries = [];
var TM = {
  war:       { label:'戰爭',     bg:'#FCEBEB', tc:'#A32D2D' },
  policy:    { label:'政策',     bg:'#EAF3DE', tc:'#3B6D11' },
  colony:    { label:'殖民',     bg:'#FAEEDA', tc:'#854F0B' },
  migration: { label:'遷徙',     bg:'#E6F1FB', tc:'#185FA5' },
  culture:   { label:'文化',     bg:'#EEEDFE', tc:'#3C3489' },
  transport: { label:'運輸',     bg:'#FFF3E0', tc:'#BF5E00' },
  finance:   { label:'金融',     bg:'#E8F5E9', tc:'#1B5E20' },
  energy:    { label:'能源',     bg:'#FFF8E1', tc:'#8B6914' },
  material:  { label:'工業原料', bg:'#F3E5F5', tc:'#6A1B9A' },
  mfg:       { label:'製造',     bg:'#E0F2F1', tc:'#00695C' },
  agri:      { label:'農業',     bg:'#F1F8E9', tc:'#33691E' },
  geo:       { label:'地緣政治', bg:'#E3F2FD', tc:'#0D47A1' },
  other:     { label:'其他',     bg:'#eeeeee', tc:'#444444' }
};

var ERAS = [
  {id:'a',label:'古代（前2000–前1年）',   start:-2000, end:0},
  {id:'b',label:'中世紀（1–1400）',       start:1,     end:1400},
  {id:'c',label:'大航海（1400–1600）',    start:1401,  end:1600},
  {id:'d',label:'早期現代（1600–1800）',  start:1601,  end:1800},
  {id:'e',label:'革命與帝國（1800–1900）',start:1801,  end:1900},
  {id:'f',label:'兩次大戰（1900–1945）',  start:1901,  end:1945},

// ══════════════════════════════════════════════════════════════
//  初始化
// ══════════════════════════════════════════════════════════════
async function startApp() {
  document.getElementById('loading-text').textContent = '連線至 Google Sheets…';
  loadFromCache();
  if (countries.length) {
    visC = new Set(countries.map(c => c.id));
    filterT = new Set(Object.keys(TM));
    render();
  }
  try {
    await loadFromCloud();
    if (syncQueue.length) {
      showStatus(`🔄 正在同步 ${syncQueue.length} 筆離線資料…`);
      await flushQueue();
    }
    visC = new Set(countries.map(c => c.id));
    filterT = new Set(Object.keys(TM));
    render();
  } catch(e) {
    setSyncStatus('error', '離線快取');
    showStatus('📵 使用離線快取', false);
    if (!countries.length) {
      document.getElementById('mainView').innerHTML = '<div class="empty">無法連線，且尚無本機快取。<br>請確認網路連線後重新整理。</div>';
    }
  }
  document.getElementById('loading-overlay').classList.add('hidden');
}

window.addEventListener('DOMContentLoaded', () => {
  updateQueuePill();
  if (!API_URL) {
    document.getElementById('loading-overlay').classList.add('hidden');
    document.getElementById('setup-overlay').classList.remove('hidden');
  } else {
    document.getElementById('setup-overlay').classList.add('hidden');
    startApp();
  }
});

// ══════════════════════════════════════════════════════════════
//  工具函式（與原版相同）
// ══════════════════════════════════════════════════════════════
function fmtY(y){ return y<0?'前'+Math.abs(y)+'年':y+'年'; }
function getEra(y){ for(var i=0;i<ERAS.length;i++){if(y>=ERAS[i].start&&y<=ERAS[i].end)return ERAS[i];}return ERAS[ERAS.length-1]; }
function getC(id){ for(var i=0;i<countries.length;i++){if(countries[i].id===id)return countries[i];}return{flag:'🌐',name:id,region:''}; }
function getM(t){ var m=TM[t];if(!m)m=TM.other||{label:'其他',bg:'#eee',tc:'#444'};return m; }
function uid(){ return 'x'+Date.now()+Math.random().toString(36).slice(2,5); }
function esc(s){ return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showStatus(msg,err){
  var el=document.getElementById('statusMsg');
  el.innerHTML='<span class="'+(err?'s-err':'s-ok')+'">'+msg+'</span>';
  setTimeout(function(){el.innerHTML='';},4000);
}

function render(){ renderForm(); if(view==='matrix')renderMatrix(); else if(view==='grid')renderGrid(); else if(view==='countries')renderCountries(); else if(view==='types')renderTypes(); }
function switchView(v){
  view=v; matrixDetailId=null; gridDetailId=null;
  document.getElementById('detailArea').innerHTML='';
  var btns=document.querySelectorAll('.tnbtn');
  for(var i=0;i<btns.length;i++) btns[i].classList.toggle('on',(i===0&&v==='matrix')||(i===1&&v==='grid')||(i===2&&v==='countries')||(i===3&&v==='types'));
  editCoId=null; render();
}

// ── 表單 ──
function toggleForm(editId){
  if(editId){editEvId=editId;showForm=true;}
  else if(showForm&&!editEvId){showForm=false;}
  else{showForm=true;editEvId=null;}
  render();
}
function cancelForm(){showForm=false;editEvId=null;render();}
function toggleFormCountry(id){ var el=document.getElementById('fcb_'+id); if(el)el.classList.toggle('checked'); }

function renderForm(){
  var area=document.getElementById('formArea');
  if(!showForm){area.innerHTML='';return;}
  var ev=null; if(editEvId){for(var i=0;i<events.length;i++){if(events[i].id===editEvId){ev=events[i];break;}}}
  var selCountries=ev?(ev.countries||[]):[];
  var cbHtml='<div class="country-checkboxes">';
  countries.forEach(function(c){
    var chk=selCountries.indexOf(c.id)>=0;
    cbHtml+='<span class="country-cb-item'+(chk?' checked':'')+'\" id="fcb_'+c.id+'" onclick="toggleFormCountry(\''+c.id+'\')">'+c.flag+' '+esc(c.name)+'</span>';
  });
  cbHtml+='</div>';
  var tOpts=Object.keys(TM).map(function(k){var m=getM(k);return'<option value="'+k+'"'+(ev&&ev.type===k?' selected':'')+'>'+m.label+'</option>';}).join('');
  area.innerHTML='<div class="card"><div class="card-title">'+(ev?'✏️ 編輯事件':'＋ 新增歷史事件')+'</div>'+
    '<div class="fg2"><div class="fg"><label>年份（西元前填負數）</label><input type="number" id="f-year" value="'+(ev?ev.year:'')+'" placeholder="例：1861 或 -221"></div>'+
    '<div class="fg"><label>類別</label><select id="f-type">'+tOpts+'</select></div></div>'+
    '<div class="fg"><label>事件名稱</label><input type="text" id="f-title" value="'+(ev?esc(ev.title):'')+'" placeholder="例：南北戰爭"></div>'+
    '<div class="fg"><label>國家／地區（可複選）</label>'+cbHtml+'</div>'+
    '<div class="fg"><label>內容說明</label><textarea id="f-desc" placeholder="背景、過程、影響...">'+(ev?esc(ev.desc):'')+'</textarea></div>'+
    '<div class="fa"><button class="bsave" onclick="saveEvent()">儲存</button><button class="bcancel" onclick="cancelForm()">取消</button></div></div>';
}

function saveEvent(){
  var year=parseInt(document.getElementById('f-year').value);
  var type=document.getElementById('f-type').value;
  var title=document.getElementById('f-title').value.trim();
  var desc=document.getElementById('f-desc').value.trim();
  if(isNaN(year)){showStatus('請輸入年份',true);return;}
  if(!title){showStatus('請輸入事件名稱',true);return;}
  var selCountries=[];
  countries.forEach(function(c){ var el=document.getElementById('fcb_'+c.id); if(el&&el.classList.contains('checked'))selCountries.push(c.id); });
  if(editEvId){
    for(var i=0;i<events.length;i++){if(events[i].id===editEvId){events[i]={id:editEvId,countries:selCountries,year:year,title:title,type:type,desc:desc};break;}}
    saveToCache(); enqueue('updateEvent', {id:editEvId,countries:selCountries,year:year,title:title,type:type,desc:desc});
    showStatus('✓ 事件已更新');
  } else {
    var newId=uid();
    var newEv={id:newId,countries:selCountries,year:year,title:title,type:type,desc:desc};
    events.push(newEv);
    saveToCache(); enqueue('addEvent', newEv);
    showStatus('✓ 事件已新增');
  }
  editEvId=null; showForm=false; matrixDetailId=null; gridDetailId=null;
  document.getElementById('detailArea').innerHTML=''; render();
}

function deleteEvent(id){
  if(!confirm('確定刪除此事件？'))return;
  events=events.filter(function(e){return e.id!==id;});
  saveToCache(); enqueue('deleteEvent', id);
  showStatus('✓ 已刪除');
  matrixDetailId=null; gridDetailId=null;
  document.getElementById('detailArea').innerHTML=''; render();
}

// ── 橫向矩陣 ──
function renderMatrix(){
  var visCountries=countries.filter(function(c){return visC.has(c.id);});
  var visEvents=events.filter(function(e){ return filterT.has(e.type)&&(e.countries||[]).some(function(cid){return visC.has(cid);}); });
  var yearMap={}; visEvents.forEach(function(e){yearMap[e.year]=true;});
  var years=Object.keys(yearMap).map(Number).sort(function(a,b){return a-b;});
  var html='<div class="fbar"><span class="fbar-label">類別：</span>';
  Object.keys(TM).forEach(function(k){
    var m=getM(k); var on=filterT.has(k);
    var style=on?'background:'+m.bg+';color:'+m.tc+';border-color:'+m.tc+';':'';
    html+='<button class="fb" style="'+style+'" onclick="toggleType(\''+k+'\')">'+m.label+'</button>';
  });
  html+='</div><div class="fbar"><span class="fbar-label">國家：</span><button class="cfbtn'+(visC.size===countries.length?' on':'')+'" onclick="toggleAllC()">全選</button>';
  countries.forEach(function(c){html+='<button class="cfbtn'+(visC.has(c.id)?' on':'')+'" onclick="toggleC(\''+c.id+'\')">'+c.flag+' '+esc(c.name)+'</button>';});
  html+='</div>';
  if(!years.length){html+='<div class="empty">尚無資料<br>點右上角「＋ 新增事件」開始記錄</div>';document.getElementById('mainView').innerHTML=html;return;}
  html+='<div class="tbl-wrap"><table><thead><tr><th>年份</th>';
  visCountries.forEach(function(c){html+='<th>'+c.flag+' '+esc(c.name)+'</th>';});
  html+='</tr></thead><tbody>';
  var lastEra=null;
  years.forEach(function(yr){
    var era=getEra(yr);
    if(!lastEra||era.id!==lastEra){html+='<tr class="era-row"><td colspan="'+(visCountries.length+1)+'">'+era.label+'</td></tr>';lastEra=era.id;}
    html+='<tr><td>'+fmtY(yr)+'</td>';
    visCountries.forEach(function(c){
      var evs=visEvents.filter(function(e){return (e.countries||[]).indexOf(c.id)>=0&&e.year===yr;});
      if(!evs.length){html+='<td><span class="dash">—</span></td>';}
      else{html+='<td>';evs.forEach(function(e){var m=getM(e.type);html+='<span class="pill'+(matrixDetailId===e.id?' sel':'')+'" style="background:'+m.bg+';color:'+m.tc+'" onclick="showMatrixDetail(\''+e.id+'\')">'+esc(e.title)+'</span>';});html+='</td>';}
    });
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  document.getElementById('mainView').innerHTML=html;
}

function showMatrixDetail(id){
  if(matrixDetailId===id){matrixDetailId=null;document.getElementById('detailArea').innerHTML='';renderMatrix();return;}
  matrixDetailId=id;
  var e=null; for(var i=0;i<events.length;i++){if(events[i].id===id){e=events[i];break;}} if(!e)return;
  var m=getM(e.type);
  var cNames=(e.countries||[]).map(function(cid){var c=getC(cid);return c.flag+' '+c.name;}).join('　');
  document.getElementById('detailArea').innerHTML=
    '<div class="detail-panel"><div class="dp-hd"><span class="dp-title">'+esc(e.title)+'</span>'+
    '<button class="dp-close" onclick="matrixDetailId=null;document.getElementById(\'detailArea\').innerHTML=\'\';renderMatrix()">✕</button></div>'+
    '<div class="dp-meta"><span>'+esc(cNames||'—')+'</span><span>·</span><span>'+fmtY(e.year)+'</span><span>·</span><span class="badge" style="background:'+m.bg+';color:'+m.tc+'">'+m.label+'</span></div>'+
    '<div class="ibox"><div class="ibox-lbl">內容說明</div><p>'+esc(e.desc||'（尚未填寫說明）')+'</p></div>'+
    '<div class="dp-btns"><button class="dpbtn" onclick="toggleForm(\''+e.id+'\')">✏️ 編輯</button><button class="dpbtn danger" onclick="deleteEvent(\''+e.id+'\')">🗑 刪除</button></div></div>';
  document.getElementById('detailArea').scrollIntoView({behavior:'smooth',block:'nearest'});
  renderMatrix();
}

// ── 國家視角 ──
function renderGrid(){
  var regionMap={}; countries.forEach(function(c){regionMap[c.region]=true;});
  var regions=Object.keys(regionMap).sort();
  var html='<div class="fbar"><span class="fbar-label">地區：</span><button class="cfbtn'+(visC.size===countries.length?' on':'')+'" onclick="toggleAllC()">全部</button>';
  regions.forEach(function(r){
    var rc=countries.filter(function(c){return c.region===r;});
    var allOn=rc.every(function(c){return visC.has(c.id);});
    html+='<button class="cfbtn'+(allOn?' on':'')+'" onclick="toggleRegion(\''+r+'\')">'+r+'</button>';
  });
  html+='</div><div class="grid-wrap">'; var any=false;
  countries.filter(function(c){return visC.has(c.id);}).forEach(function(c){
    var evs=events.filter(function(e){return (e.countries||[]).indexOf(c.id)>=0&&filterT.has(e.type);}).sort(function(a,b){return a.year-b.year;});
    if(!evs.length)return; any=true;
    html+='<div class="gc"><div class="gc-hd"><span class="gc-flag">'+c.flag+'</span><div><div class="gc-name">'+esc(c.name)+'</div><div class="gc-reg">'+esc(c.region)+'</div></div></div>';
    evs.forEach(function(e){
      var m=getM(e.type); var isOpen=gridDetailId===e.id;
      html+='<div class="gc-ev'+(isOpen?' active':'')+'" onclick="toggleGridDetail(\''+e.id+'\')">'+
        '<div class="gc-yr">'+fmtY(e.year)+'</div>'+
        '<div class="gc-title"><span>'+esc(e.title)+' <span class="badge" style="background:'+m.bg+';color:'+m.tc+'">'+m.label+'</span></span>'+
        '<span class="gc-arrow">'+(isOpen?'▲':'▼')+'</span></div></div>';
      if(isOpen){
        html+='<div class="inline-detail">'+
          '<div class="inline-detail-title">'+esc(e.title)+'</div>'+
          '<div class="inline-detail-meta"><span>'+fmtY(e.year)+'</span><span>·</span><span class="badge" style="background:'+m.bg+';color:'+m.tc+'">'+m.label+'</span></div>'+
          '<div class="inline-detail-desc">'+esc(e.desc||'（尚未填寫說明）')+'</div>'+
          '<div class="inline-detail-btns">'+
          '<button class="idbtn" onclick="event.stopPropagation();toggleForm(\''+e.id+'\')">✏️ 編輯</button>'+
          '<button class="idbtn danger" onclick="event.stopPropagation();deleteEvent(\''+e.id+'\')">🗑 刪除</button>'+
          '</div></div>';
      }
    });
    html+='</div>';
  });
  if(!any)html+='<div class="empty" style="grid-column:1/-1">此篩選條件下沒有資料</div>';
  html+='</div>';
  document.getElementById('mainView').innerHTML=html;
}
function toggleGridDetail(id){ gridDetailId=(gridDetailId===id)?null:id; renderGrid(); if(gridDetailId){setTimeout(function(){var a=document.querySelector('.gc-ev.active');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest'});},50);} }

// ── 管理國家 ──
function renderCountries(){
  var co=null; if(editCoId){for(var i=0;i<countries.length;i++){if(countries[i].id===editCoId){co=countries[i];break;}}}
  var html='<div class="card"><div class="card-title">'+(co?'✏️ 編輯國家':'＋ 新增國家')+'</div>'+
    '<div class="fg4"><div class="fg"><label>旗幟 emoji</label><input id="nc-flag" value="'+(co?co.flag:'')+'" placeholder="🇹🇼" style="font-size:20px"></div>'+
    '<div class="fg"><label>國家名稱</label><input id="nc-name" value="'+(co?esc(co.name):'')+'" placeholder="台灣"></div>'+
    '<div class="fg"><label>地區分組</label><input id="nc-region" value="'+(co?esc(co.region):'')+'" placeholder="亞洲"></div>'+
    '<div><button class="bsave" style="width:100%;padding:7px 0" onclick="saveCountry()">'+(co?'更新':'新增')+'</button></div></div>'+
    (co?'<div style="margin-top:6px"><button class="bcancel" onclick="editCoId=null;renderCountries()">取消</button></div>':'')+
    '</div>';
  html+='<div class="card" style="padding:0;overflow:hidden"><div class="clist-hd"><span></span><span>名稱</span><span>地區</span><span>事件數</span><span></span><span></span></div>';
  if(!countries.length)html+='<div class="empty">尚無國家</div>';
  else countries.forEach(function(c){
    var cnt=events.filter(function(e){return (e.countries||[]).indexOf(c.id)>=0;}).length;
    html+='<div class="clist-row"><span style="font-size:17px;text-align:center">'+c.flag+'</span>'+
      '<span style="font-size:13px;font-weight:700;color:#111">'+esc(c.name)+'</span>'+
      '<span style="font-size:12px;color:#888">'+esc(c.region)+'</span>'+
      '<span style="font-size:12px;color:#aaa;text-align:center">'+cnt+' 件</span>'+
      '<button class="bedit" onclick="startEditCo(\''+c.id+'\')">編輯</button>'+
      '<button class="bdanger" onclick="deleteCountry(\''+c.id+'\')">刪除</button></div>';
  });
  html+='</div>';
  document.getElementById('mainView').innerHTML=html;
}
function startEditCo(id){editCoId=id;renderCountries();window.scrollTo({top:0,behavior:'smooth'});}
function saveCountry(){
  var flag=document.getElementById('nc-flag').value.trim()||'🌐';
  var name=document.getElementById('nc-name').value.trim();
  var region=document.getElementById('nc-region').value.trim()||'其他';
  if(!name){showStatus('請輸入國家名稱',true);return;}
  if(editCoId){
    for(var i=0;i<countries.length;i++){if(countries[i].id===editCoId){countries[i].flag=flag;countries[i].name=name;countries[i].region=region;break;}}
    showStatus('✓ 國家已更新');
  } else {
    var id=uid(); countries.push({id:id,name:name,flag:flag,region:region}); visC.add(id);
    showStatus('✓ 已新增：'+flag+' '+name);
  }
  editCoId=null; saveToCache(); enqueue('saveCountries', countries); renderCountries();
}
function deleteCountry(id){
  var cnt=events.filter(function(e){return (e.countries||[]).indexOf(id)>=0;}).length;
  if(!confirm(cnt>0?'此國家有 '+cnt+' 筆事件，刪除後事件仍保留。確定？':'確定刪除？'))return;
  countries=countries.filter(function(c){return c.id!==id;}); visC.delete(id);
  saveToCache(); enqueue('saveCountries', countries);
  showStatus('✓ 已刪除'); renderCountries();
}

// ── 管理類別 ──
function renderTypes(){
  var html='<div class="card"><div class="card-title">管理事件類別</div>';
  Object.keys(TM).forEach(function(k){
    var m=TM[k]; var cnt=events.filter(function(e){return e.type===k;}).length;
    html+='<div class="type-list-row">'+
      '<div class="type-color-dot" style="background:'+m.bg+';border:2px solid '+m.tc+'"></div>'+
      '<div class="type-list-name" style="color:'+m.tc+'">'+esc(m.label)+'</div>'+
      '<div style="font-size:11px;color:#aaa;margin-right:8px">'+cnt+' 件</div>'+
      '<button class="bdanger" '+(cnt>0?'disabled style="opacity:.35;cursor:not-allowed"':'')+' onclick="deleteType(\''+k+'\')">刪除</button></div>';
  });
  html+='<div style="margin-top:16px;font-size:11px;font-weight:700;color:#999;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px">新增類別</div>';
  html+='<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">'+
    '<input id="nt-label" placeholder="類別名稱（例：科技）" style="font-size:13px;padding:6px 9px;border:1px solid #ddd;border-radius:7px;color:#111;background:#fff;font-family:inherit;outline:none;flex:1;min-width:120px">'+
    '<button class="bsave" onclick="addType()">新增</button></div>';
  html+='<div style="margin-top:10px;font-size:11px;color:#999;margin-bottom:5px">選擇顏色</div><div class="color-presets">';
  COLOR_PRESETS.forEach(function(p,i){
    html+='<div class="color-preset'+(selPresetIdx===i?' sel':'')+'" style="background:'+p.bg+';border-color:'+(selPresetIdx===i?p.tc:'transparent')+'" onclick="selPreset('+i+')" title="'+p.tc+'"></div>';
  });
  html+='</div></div>';
  document.getElementById('mainView').innerHTML=html;
}
function selPreset(i){selPresetIdx=i;renderTypes();}
function addType(){
  var label=document.getElementById('nt-label').value.trim(); if(!label){showStatus('請輸入類別名稱',true);return;}
  var key=uid(); var p=COLOR_PRESETS[selPresetIdx]||COLOR_PRESETS[0];
  TM[key]={label:label,bg:p.bg,tc:p.tc}; filterT.add(key);
  showStatus('✓ 已新增類別：'+label);
  saveToCache(); enqueue('saveTypes', TM); renderTypes();
}
function deleteType(k){
  var cnt=events.filter(function(e){return e.type===k;}).length;
  if(cnt>0){showStatus('此類別有 '+cnt+' 筆事件，請先刪除或更改事件類別',true);return;}
  if(!confirm('確定刪除類別「'+TM[k].label+'」？'))return;
  delete TM[k]; filterT.delete(k);
  saveToCache(); enqueue('saveTypes', TM);
  showStatus('✓ 已刪除類別'); renderTypes();
}

// ── 篩選 ──
function toggleType(k){if(filterT.has(k))filterT.delete(k);else filterT.add(k);matrixDetailId=null;gridDetailId=null;document.getElementById('detailArea').innerHTML='';render();}
function toggleC(id){if(visC.has(id))visC.delete(id);else visC.add(id);matrixDetailId=null;gridDetailId=null;document.getElementById('detailArea').innerHTML='';render();}
function toggleAllC(){visC=visC.size===countries.length?new Set():new Set(countries.map(function(c){return c.id;}));render();}
function toggleRegion(r){
  var rc=countries.filter(function(c){return c.region===r;});
  var allOn=rc.every(function(c){return visC.has(c.id);});
  rc.forEach(function(c){if(allOn)visC.delete(c.id);else visC.add(c.id);}); render();
}

// ── 備份 / 還原 ──
function exportJSON(){
  var content=JSON.stringify({events:events,countries:countries,types:TM,exported:new Date().toISOString()},null,2);
  var blob=new Blob([content],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='world_history_backup_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  showStatus('✓ JSON 備份已下載');
}
function importJSON(e){
  var file=e.target.files[0]; if(!file)return;
  if(!confirm('匯入會覆蓋目前所有資料，確定繼續？')){e.target.value='';return;}
  var reader=new FileReader();
  reader.onload=async function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(data.events)   events=data.events;
      if(data.countries)countries=data.countries;
      if(data.types)    TM=data.types;
      events.forEach(function(e){if(!e.countries)e.countries=[];});
      visC=new Set(countries.map(function(c){return c.id;}));
      filterT=new Set(Object.keys(TM));
      showStatus('📤 上傳到 Google Sheets 中…');
      saveToCache();
      const res = await apiPost({ action:'saveAll', payload:{ events, countries, types:TM } });
      if(res.error) throw new Error(res.error);
      render(); showStatus('✓ 匯入並上傳完成，共 '+events.length+' 筆事件');
    }catch(err){ showStatus('❌ 失敗：'+err.message,true); }
    e.target.value='';
  };
  reader.readAsText(file);
}
</script>
