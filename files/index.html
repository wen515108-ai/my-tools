<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="我的工具箱">
<meta name="theme-color" content="#f5f4f0" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#111110" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.json">
<title>我的工具箱</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap');

/* ── 色彩系統（深淺自動切換） ── */
:root {
  --bg:        #f5f4f0;
  --bg2:       #eceae4;
  --surface:   #ffffff;
  --border:    #e0ddd6;
  --text:      #111110;
  --text2:     #6b6860;
  --text3:     #9b9890;
  --accent:    #2a5c45;
  --accent-bg: #e8f0eb;
  --star:      #c8921a;
  --radius:    13px;
  --shadow:    0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.05);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:        #111110;
    --bg2:       #1a1a18;
    --surface:   #1f1f1d;
    --border:    #2c2c29;
    --text:      #f0ede6;
    --text2:     #8a8780;
    --text3:     #5a5855;
    --accent:    #4a9b72;
    --accent-bg: #1a2e22;
    --star:      #d4a030;
    --shadow:    0 1px 3px rgba(0,0,0,.3), 0 4px 12px rgba(0,0,0,.2);
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom, 20px);
}

/* ── Header ── */
header {
  padding: calc(env(safe-area-inset-top, 0px) + 20px) 20px 0;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-inner {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.header-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
}
.header-sub {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
  font-weight: 400;
}
.edit-btn {
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 0;
  font-family: inherit;
}

/* ── 主內容 ── */
main { padding: 0 20px; }

/* ── Section 標題 ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 10px;
}
.section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
}

/* ── 最愛列表 ── */
.favorites-list {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.fav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  text-decoration: none;
  color: inherit;
  position: relative;
}
.fav-item:last-child { border-bottom: none; }
.fav-item:active { background: var(--bg2); }
.fav-icon {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.fav-info { flex: 1; min-width: 0; }
.fav-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.fav-cat {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}
.fav-arrow {
  color: var(--text3);
  font-size: 12px;
  flex-shrink: 0;
}
.fav-remove {
  display: none;
  background: #e0362a;
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  font-size: 14px;
  line-height: 1;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: inherit;
}
body.editing .fav-remove { display: flex; }
body.editing .fav-arrow { display: none; }

.empty-fav {
  padding: 28px 16px;
  text-align: center;
  color: var(--text3);
  font-size: 13px;
  line-height: 1.7;
}
.empty-fav .icon { font-size: 28px; display: block; margin-bottom: 6px; }

/* ── 分類卡片 ── */
.categories-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.category-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: background 0.15s;
}
.category-card:active { background: var(--bg2); }
.category-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
}
.category-icon {
  font-size: 22px;
  width: 40px;
  text-align: center;
  flex-shrink: 0;
}
.category-info { flex: 1; }
.category-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.category-count {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
}
.category-chevron {
  font-size: 11px;
  color: var(--text3);
  transition: transform 0.2s;
}
.category-card.open .category-chevron { transform: rotate(90deg); }

/* 分類內工具列表（展開） */
.category-tools {
  display: none;
  border-top: 1px solid var(--border);
}
.category-card.open .category-tools { display: block; }
.tool-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px 13px 56px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  text-decoration: none;
  color: inherit;
}
.tool-item:last-child { border-bottom: none; }
.tool-item:active { background: var(--bg2); }
.tool-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.tool-info { flex: 1; min-width: 0; }
.tool-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.tool-desc {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tool-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.star-btn {
  background: none;
  border: none;
  font-size: 16px;
  cursor: pointer;
  padding: 2px;
  line-height: 1;
  transition: transform 0.15s;
  color: var(--text3);
}
.star-btn.starred { color: var(--star); }
.star-btn:active { transform: scale(1.3); }
body:not(.editing) .star-btn { display: none; }
body.editing .star-btn { display: block; }
.tool-arrow {
  font-size: 11px;
  color: var(--text3);
}
body.editing .tool-arrow { display: none; }

/* ── 新增工具提示 ── */
.add-hint {
  text-align: center;
  padding: 24px 20px;
  color: var(--text3);
  font-size: 12px;
  line-height: 1.8;
}

/* ── 分隔 ── */
.spacer { height: 8px; }

/* ── 入場動畫 ── */
.section-header, .favorites-list, .category-card {
  animation: fadeUp 0.3s ease both;
}
.category-card:nth-child(1) { animation-delay: 0.05s; }
.category-card:nth-child(2) { animation-delay: 0.10s; }
.category-card:nth-child(3) { animation-delay: 0.15s; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="header-title">我的工具箱</div>
      <div class="header-sub" id="last-updated">個人工具與筆記集合</div>
    </div>
    <button class="edit-btn" id="edit-btn" onclick="toggleEdit()">編輯</button>
  </div>
</header>

<main>
  <!-- 最愛 -->
  <div class="section-header">
    <div class="section-title">⭐ 我的最愛</div>
  </div>
  <div class="favorites-list" id="favorites-list"></div>

  <!-- 分類 -->
  <div class="section-header" style="padding-top:24px">
    <div class="section-title">所有工具</div>
  </div>
  <div class="categories-grid" id="categories-grid"></div>

  <div class="add-hint">
    長按工具旁的 ☆ 可加入最愛<br>
    點「編輯」可管理最愛
  </div>
  <div class="spacer"></div>
</main>

<script>
// ══════════════════════════════════════════════════════
//  工具資料庫
//  新增工具：在對應分類的 tools 陣列加一筆
//  新增分類：在 CATEGORIES 加一個物件
// ══════════════════════════════════════════════════════
const CATEGORIES = [
  {
    id: 'learning',
    name: '學習筆記',
    icon: '📚',
    tools: [
      {
        id: 'book-flat-world',
        name: '世界不再是平的',
        desc: '讀書筆記・心智圖・重點整理',
        icon: '🌍',
        iconBg: '#e8f0f8',
        iconBgDark: '#1a2535',
        url: './book-flat-world/index.html'
      },
      {
        id: 'world-history',
        name: '世界歷史',
        desc: '歷史對照表・時代脈絡',
        icon: '🏛',
        iconBg: '#f5ede0',
        iconBgDark: '#2a2018',
        url: './world-history/index.html'
      }
    ]
  },
  {
    id: 'tools',
    name: '實用工具',
    icon: '🛠',
    tools: [
      {
        id: 'cash',
        name: '現金記帳',
        desc: '多帳戶・Google Sheets 同步',
        icon: '💴',
        iconBg: '#e8f0eb',
        iconBgDark: '#1a2820',
        url: './cash/index.html'
      }
    ]
  }
];

// ── 最愛（存 localStorage） ──
const LS_FAV = 'toolbox_favorites';
let favorites = [];
try { favorites = JSON.parse(localStorage.getItem(LS_FAV) || '[]'); } catch(e) {}

function saveFavorites() { localStorage.setItem(LS_FAV, JSON.stringify(favorites)); }

function isFav(id) { return favorites.includes(id); }

function toggleFav(id, btn) {
  if (isFav(id)) {
    favorites = favorites.filter(f => f !== id);
  } else {
    favorites.push(id);
  }
  saveFavorites();
  renderFavorites();
  renderCategories();
  // 按鈕動畫
  if (btn) { btn.style.transform = 'scale(1.4)'; setTimeout(() => btn.style.transform = '', 200); }
}

function removeFav(id) {
  favorites = favorites.filter(f => f !== id);
  saveFavorites();
  renderFavorites();
  renderCategories();
}

// ── 取得工具資料 ──
function getToolById(id) {
  for (const cat of CATEGORIES) {
    const t = cat.tools.find(t => t.id === id);
    if (t) return { ...t, catName: cat.name };
  }
  return null;
}

// ── 深色模式偵測 ──
const isDark = () => window.matchMedia('(prefers-color-scheme: dark)').matches;

// ── 渲染最愛 ──
function renderFavorites() {
  const el = document.getElementById('favorites-list');
  const validFavs = favorites.filter(id => getToolById(id));

  if (!validFavs.length) {
    el.innerHTML = `<div class="empty-fav"><span class="icon">☆</span>點「編輯」後，長按工具旁的星號<br>即可加入最愛</div>`;
    return;
  }

  el.innerHTML = validFavs.map(id => {
    const t = getToolById(id);
    if (!t) return '';
    const bg = isDark() ? t.iconBgDark : t.iconBg;
    return `<a class="fav-item" href="${t.url}">
      <div class="fav-icon" style="background:${bg}">${t.icon}</div>
      <div class="fav-info">
        <div class="fav-name">${t.name}</div>
        <div class="fav-cat">${t.catName}</div>
      </div>
      <button class="fav-remove" onclick="event.preventDefault();event.stopPropagation();removeFav('${id}')">−</button>
      <div class="fav-arrow">›</div>
    </a>`;
  }).join('');
}

// ── 渲染分類 ──
let openCategories = new Set();

function renderCategories() {
  const grid = document.getElementById('categories-grid');
  grid.innerHTML = CATEGORIES.map(cat => {
    const isOpen = openCategories.has(cat.id);
    const toolsHtml = cat.tools.map(t => {
      const starred = isFav(t.id);
      const bg = isDark() ? t.iconBgDark : t.iconBg;
      return `<a class="tool-item" href="${t.url}">
        <div class="tool-icon" style="background:${bg}">${t.icon}</div>
        <div class="tool-info">
          <div class="tool-name">${t.name}</div>
          <div class="tool-desc">${t.desc}</div>
        </div>
        <div class="tool-actions">
          <button class="star-btn ${starred ? 'starred' : ''}"
            onclick="event.preventDefault();event.stopPropagation();toggleFav('${t.id}',this)"
          >${starred ? '★' : '☆'}</button>
          <div class="tool-arrow">›</div>
        </div>
      </a>`;
    }).join('');

    return `<div class="category-card ${isOpen ? 'open' : ''}" id="cat-${cat.id}">
      <div class="category-header" onclick="toggleCategory('${cat.id}')">
        <div class="category-icon">${cat.icon}</div>
        <div class="category-info">
          <div class="category-name">${cat.name}</div>
          <div class="category-count">${cat.tools.length} 個工具</div>
        </div>
        <div class="category-chevron">›</div>
      </div>
      <div class="category-tools">${toolsHtml}</div>
    </div>`;
  }).join('');
}

function toggleCategory(id) {
  if (openCategories.has(id)) openCategories.delete(id);
  else openCategories.add(id);
  const card = document.getElementById('cat-' + id);
  if (card) card.classList.toggle('open', openCategories.has(id));
}

// ── 編輯模式 ──
let editing = false;
function toggleEdit() {
  editing = !editing;
  document.body.classList.toggle('editing', editing);
  document.getElementById('edit-btn').textContent = editing ? '完成' : '編輯';
  if (editing) {
    // 展開所有分類方便操作
    CATEGORIES.forEach(c => openCategories.add(c.id));
    renderCategories();
  }
}

// ── 深色模式切換時重新渲染 icon 背景 ──
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  renderFavorites();
  renderCategories();
});

// ── 初始化 ──
renderFavorites();
renderCategories();
</script>
</body>
</html>
